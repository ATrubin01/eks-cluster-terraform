name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy (dev, staging, production)'
        required: true
        default: 'production'
        type: choice
        options:
          - dev
          - staging
          - production
      confirm:
        description: 'Type "destroy" to confirm'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: ${{ inputs.confirm == 'destroy' }}
    defaults:
      run:
        working-directory: ./roots/main-eks-root

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: us-east-1
        role-to-assume: ${{ secrets.IAM_ROLE }}
        audience: sts.amazonaws.com

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
          -backend-config="key=terraform/eks/${{ inputs.environment }}.tfstate" \
          -backend-config="region=us-east-1" \
          -backend-config="dynamodb_table=terraform-state-lock" \
          -backend-config="encrypt=true"

    - name: Force unlock state (clear any stale locks)
      run: |
        LOCK_ID=$(aws dynamodb scan \
          --table-name terraform-state-lock \
          --region us-east-1 \
          --query 'Items[0].LockID.S' \
          --output text 2>/dev/null || echo "")
        if [ -n "$LOCK_ID" ] && [ "$LOCK_ID" != "None" ] && [ "$LOCK_ID" != "null" ]; then
          terraform force-unlock -force "$LOCK_ID" || true
        fi

    - name: Terraform Destroy
      run: terraform destroy -var-file=${{ inputs.environment }}.tfvars -auto-approve
